<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questioner - Chemistry</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    // Configure MathJax
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    html, body {
        overflow: scroll;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    
    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
        display: none;
    }
    
    body {
      background: #fafafa;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .navbar-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem 0;
    }
    
    #navbar-placeholder {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    
    .content-wrapper {
      padding-top: 0;
    }
    
    .option-btn {
      transition: all 0.2s ease;
    }
    
    .option-btn:hover:not(:disabled) {
      transform: translateX(4px);
      background-color: #f0f0f0;
    }
    
    .option-btn.correct {
      background-color: #22c55e;
      color: white;
      border-color: #22c55e;
    }
    
    .option-btn.incorrect {
      background-color: #ef4444;
      color: white;
      border-color: #ef4444;
    }
    
    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }
    
    /* Custom Checkbox */
    .custom-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #a855f7;
      border-radius: 6px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    
    .custom-checkbox:hover {
      border-color: #9333ea;
      transform: scale(1.1);
    }
    
    .custom-checkbox input {
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    
    .custom-checkbox.checked {
      background-color: #a855f7;
      border-color: #a855f7;
    }
    
    .custom-checkbox.checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-weight: bold;
      font-size: 16px;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    
    /* Next Arrow Button */
    .next-arrow {
      position: fixed;
      top: 100px;
      right: 40px;
      width: 56px;
      height: 56px;
      background: #a855f7;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
      transition: all 0.2s ease;
    }
    
    .next-arrow:hover {
      background: #9333ea;
      transform: scale(1.1);
    }
    
    .next-arrow.visible {
      display: flex;
    }
    
    /* Keyword Tag */
    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: black;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
    }
    
    .keyword-tag .remove {
      cursor: pointer;
      color: white;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
    }
    
    .keyword-tag .remove:hover {
      opacity: 0.7;
    }
    
    /* Next Arrow in Question Card */
    .question-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      right: 0;
      width: 40px;
      height: 40px;
      background: white;
      border: 1px solid black;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .question-arrow:hover {
      background: #f0f0f0;
    }
    
    .question-arrow.visible {
      display: flex;
    }
    
    .question-arrow i {
      color: black;
    }
    
    .ref-or-arrow-slot {
      position: absolute;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
    }
    
    #reference-sheet-btn.hidden-slot {
      display: none;
    }
    
    .question-card {
      position: relative;
    }
    
    /* Always hide stats on mobile */
    @media (max-width: 767px) {
      #freeplay-stats {
        display: none !important;
      }
    }
    
    /* Reference modal - same design as settings */
    #reference-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1001;
      display: none;
      align-items: center;
      justify-content: center;
    }
    
    #reference-modal.active {
      display: flex;
    }
    
    #reference-modal .modal-inner {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 1rem;
      padding: 1.5rem;
      max-width: 90vw;
      max-height: 90vh;
      width: 800px;
      display: flex;
      flex-direction: column;
    }
    
    #reference-modal iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 8px;
    }
    
    /* Question image - centered */
    #question-image-container {
      display: flex;
      justify-content: center;
      width: 100%;
    }
    
    .question-image-wrap {
      margin: 1rem 0;
      border: 4px dotted black;
      padding: 4px;
      display: inline-block;
      cursor: pointer;
    }
    
    .question-image-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
    }
    
    /* Image enlarge modal */
    #image-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1001;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    #image-modal.active {
      display: flex;
    }
    
    #image-modal .modal-inner {
      max-width: 95vw;
      max-height: 95vh;
      position: relative;
    }
    
    #image-modal .modal-inner img {
      max-width: 100%;
      max-height: 90vh;
      display: block;
    }
  </style>
</head>
<body>
  <div class="navbar-container">
    <div id="navbar-placeholder"></div>
  </div>
  
  
  <!-- Reference PDF Modal (settings-style) -->
  <div id="reference-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[1001] hidden items-center justify-center" onclick="closeReferenceModal(event)">
    <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 max-w-4xl w-full mx-4 shadow-2xl max-h-[90vh] flex flex-col" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-black">Reference Sheet</h2>
        <button type="button" onclick="closeReferenceModal()" class="text-gray-600 hover:text-black transition-colors">
          <i class="fas fa-times text-2xl"></i>
        </button>
      </div>
      <iframe id="reference-iframe" src="" title="Reference PDF" class="flex-1 min-h-[70vh] w-full border rounded-lg"></iframe>
    </div>
  </div>
  
  <!-- Image enlarge modal -->
  <div id="image-modal" class="fixed inset-0 bg-black/80 z-[1001] hidden items-center justify-center p-4" onclick="closeImageModal(event)">
    <div class="max-w-[95vw] max-h-[95vh] relative" onclick="event.stopPropagation()">
      <button type="button" onclick="closeImageModal()" class="absolute -top-10 right-0 text-white hover:text-gray-300">
        <i class="fas fa-times text-2xl"></i>
      </button>
      <img id="image-modal-img" src="" alt="">
    </div>
  </div>
  
  <!-- Modal -->
  <div class="modal" id="question-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
        <i class="fas fa-times text-2xl"></i>
      </button>
      <h3 class="text-2xl font-bold text-gray-900 mb-6" id="modal-question-id"></h3>
      <p class="text-lg text-gray-700 mb-8" id="modal-question-text"></p>
      <div class="mb-8">
        <h4 class="font-semibold text-gray-900 mb-4">Options:</h4>
        <div class="space-y-3" id="modal-options"></div>
      </div>
      <div>
        <h4 class="font-semibold text-gray-900 mb-4">Keywords:</h4>
        <div class="flex flex-wrap gap-2" id="modal-keywords"></div>
      </div>
    </div>
  </div>
  
  <div class="content-wrapper pb-12 px-4 md:px-8 lg:px-16 max-w-5xl mx-auto mt-12">
    <!-- Setup Screen -->
    <div id="setup-screen" class="mb-16">
      <!-- Unit Selection -->
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 mb-4 text-center md:text-left">Select Units</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked">
              <input type="checkbox" class="unit-checkbox" value="1" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 1 - Fundamentals</span>
              <p class="text-sm text-gray-600 hidden md:block">Measurements, significant digits, SI units, metric prefixes, unit conversions, classification of matter, the mole, concentration terms, isotopes</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="2" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 2 - Stoichiometry</span>
              <p class="text-sm text-gray-600 hidden md:block">Compositional and reaction stoichiometry, chemical formulas, balancing reactions, limiting reactant, percent yield</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="3" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 3 - Atomic Theory</span>
              <p class="text-sm text-gray-600 hidden md:block">Electromagnetic radiation, quantum theory, electron configurations, periodic trends, ionization energy, electronegativity</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="4" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 4 - Chemical Bonding and Structure</span>
              <p class="text-sm text-gray-600 hidden md:block">Lewis structures, VSEPR theory, hybrid orbitals, molecular orbital theory, molecular polarity</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="5" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 5 - Gases</span>
              <p class="text-sm text-gray-600 hidden md:block">Gas laws, ideal gas law, Dalton's law, kinetic molecular theory, diffusion and effusion, real gas behavior</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="6" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 6 - Liquids and Solids</span>
              <p class="text-sm text-gray-600 hidden md:block">Intermolecular forces, physical properties, phase transitions, lattice energies</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="7" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 7 - Thermodynamics</span>
              <p class="text-sm text-gray-600 hidden md:block">First and second law, enthalpy, entropy, Gibbs free energy, Hess's law, calorimetry</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="8" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 8 - Physical Equilibria</span>
              <p class="text-sm text-gray-600 hidden md:block">Phase diagrams, colligative properties, Raoult's law, van't Hoff factor</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="9" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 9 - Chemical Equilibria</span>
              <p class="text-sm text-gray-600 hidden md:block">Equilibrium constants, reaction quotient, Le Chatelier's principle, heterogeneous equilibria</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="10" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 10 - Acids and Bases</span>
              <p class="text-sm text-gray-600 hidden md:block">Strong vs weak acids/bases, pH, ionization constants, buffers, titrations, indicators</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="11" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 11 - Solubility Equilibria</span>
              <p class="text-sm text-gray-600 hidden md:block">Ksp, molar solubility, common ion effect, fractional precipitation, complex ion formation</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="12" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 12 - Electrochemistry</span>
              <p class="text-sm text-gray-600 hidden md:block">Redox reactions, electrochemical cells, standard potentials, Nernst equation, batteries</p>
            </div>
          </label>
          <label class="flex items-center gap-3 p-4 bg-white rounded-2xl border-2 border-gray-200 cursor-pointer hover:border-purple-500 transition-colors">
            <div class="custom-checkbox checked" onclick="toggleCheckbox(this)">
              <input type="checkbox" class="unit-checkbox" value="13" checked>
            </div>
            <div>
              <span class="font-semibold text-gray-900">Unit 13 - Chemical Kinetics</span>
              <p class="text-sm text-gray-600 hidden md:block">Reaction rates, rate laws, reaction mechanisms, activation energy, Arrhenius equation, catalysts</p>
            </div>
          </label>
        </div>
        <div class="mt-4 flex gap-2 justify-center hidden md:flex">
          <button onclick="selectAllUnits()" class="text-sm text-black hover:text-gray-700 font-medium">Select All</button>
          <span class="text-gray-400">|</span>
          <button onclick="deselectAllUnits()" class="text-sm text-black hover:text-gray-700 font-medium">Deselect All</button>
        </div>
      </div>
      
      <!-- Configuration -->
      <div class="mb-4">
        <h2 class="text-3xl font-bold text-gray-900 mb-4 text-center md:text-left">Configuration</h2>
        <div class="mb-4">
          <input type="text" id="keyword-search" placeholder="Search for keywords..." class="w-full p-4 border-2 border-gray-200 rounded-lg focus:border-black focus:outline-none">
          <div id="keyword-suggestions" class="mt-2 bg-white border-2 border-gray-200 rounded-lg max-h-48 overflow-y-auto hidden"></div>
        </div>
        <div id="selected-keywords" class="flex flex-wrap gap-2 mb-4"></div>
        <input type="number" id="question-count" min="1" placeholder="Number of questions (leave blank for freeplay)" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-black focus:outline-none">
      </div>
      
      <!-- Start Button -->
      <button onclick="startQuiz()" class="w-full bg-black text-white py-4 rounded-lg font-semibold text-lg transition-all hover:-translate-y-1">
        Start Quiz
      </button>
    </div>
    
    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      <!-- Progress Bar (only in fixed mode) -->
      <div id="progress-container" class="mb-8 hidden">
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm font-medium text-gray-600">Question <span id="current-question-num">1</span> of <span id="total-questions">0</span></span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div id="progress-bar" class="bg-purple-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>
      
      <!-- Stats (only in freeplay mode) -->
      <div id="freeplay-stats" class="mb-6 bg-white rounded-lg p-4 border-2 border-gray-200 hidden md:block">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
          <div>
            <div class="text-2xl font-bold text-gray-900" id="stat-accuracy">0%</div>
            <div class="text-sm text-gray-600">Accuracy</div>
          </div>
          <div>
            <div class="text-2xl font-bold text-green-600" id="stat-correct">✅ 0</div>
            <div class="text-sm text-gray-600">Correct</div>
          </div>
          <div>
            <div class="text-2xl font-bold text-red-600" id="stat-incorrect">❌ 0</div>
            <div class="text-sm text-gray-600">Incorrect</div>
          </div>
          <div>
            <div class="text-2xl font-bold text-orange-600" id="stat-streak">🔥 0</div>
            <div class="text-sm text-gray-600">Streak</div>
          </div>
        </div>
      </div>
      
      <!-- Question Card -->
      <div class="question-card bg-white rounded-xl p-8 border-2 border-gray-200 mb-6">
        <div class="mb-6 flex items-center gap-3 relative">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Unit <span id="question-unit"></span></span>
          <span class="text-xs text-gray-400">•</span>
          <span class="text-xs text-gray-500" id="question-id-display"></span>
          <button onclick="showQuestionModal()" class="text-gray-500 hover:text-gray-700 flex items-center">
            <i class="fas fa-info-circle"></i>
          </button>
          <div class="flex-1 min-w-0"></div>
          <div class="question-arrow" id="question-arrow" onclick="nextQuestion()">
            <i class="fas fa-arrow-right"></i>
          </div>
        </div>
        <div id="question-image-container" class="mb-4" style="display: none;"></div>
        <div class="flex flex-wrap items-center gap-2 mb-6 mt-4">
          <h2 class="text-2xl font-bold text-gray-900 inline" id="question-text"></h2>
          <button type="button" id="reference-sheet-btn" onclick="openReferenceModal()" class="inline-flex items-center justify-center px-3 py-1.5 text-black border border-black rounded-full text-sm font-medium hover:bg-gray-100 transition-colors shrink-0 align-middle" title="Reference sheet">
            <i class="fas fa-file-pdf mr-1"></i> PDF
          </button>
        </div>
        
        <div class="space-y-3" id="options-container"></div>
      </div>
      
      <!-- Results Screen -->
      <div id="results-screen" class="hidden">
        <div class="bg-white rounded-xl p-10 border-2 border-gray-200 text-center">
          <div class="text-6xl mb-4">🎉</div>
          <h2 class="text-4xl font-bold text-gray-900 mb-4">Quiz Complete!</h2>
          <p class="text-2xl text-gray-600 mb-6">Final Score: <span id="final-score" class="font-bold text-green-600">0</span>/<span id="final-total">0</span></p>
          <div class="flex gap-4 justify-center">
            <button onclick="restartQuiz()" class="bg-green-500 text-white px-8 py-3 rounded-lg font-semibold hover:bg-green-600 transition-colors">
              Start New Quiz
            </button>
            <a href="index.html" class="bg-gray-200 text-gray-800 px-8 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">
              Back to Chemistry
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let allQuestions = [];
    let allKeywords = new Set();
    let filteredQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let totalAnswered = 0;
    let correctCount = 0;
    let incorrectCount = 0;
    let currentStreak = 0;
    let selectedAnswer = null;
    let showingFeedback = false;
    let isFreeplay = true;
    let targetQuestionCount = 0;
    let selectedKeywords = new Set();
    let currentQuestion = null;
    
    const unitNames = {
      1: "Fundamentals",
      2: "Stoichiometry",
      3: "Atomic Theory",
      4: "Chemical Bonding and Structure",
      5: "Gases",
      6: "Liquids and Solids",
      7: "Thermodynamics",
      8: "Physical Equilibria",
      9: "Chemical Equilibria",
      10: "Acids and Bases",
      11: "Solubility Equilibria",
      12: "Electrochemistry",
      13: "Chemical Kinetics"
    };
    
    // Load navbar
    $(document).ready(function() {
      $('#navbar-placeholder').load('../navbar.html');
      loadQuestions();
      
      // Keyword search
      $('#keyword-search').on('input', function() {
        const searchTerm = $(this).val().toLowerCase();
        if (searchTerm.length > 0) {
          showKeywordSuggestions(searchTerm);
        } else {
          $('#keyword-suggestions').addClass('hidden');
        }
      });

      // Enter key moves to next question
      $(document).on('keydown', function(e) {
        if (e.key !== 'Enter') return;
        if ($(e.target).closest('input, textarea, select').length) return;
        if ($('#quiz-screen').hasClass('hidden')) return;
        if ($('#results-screen').hasClass('hidden') === false) return;
        if (filteredQuestions.length === 0) return;
        e.preventDefault();
        nextQuestion();
      });
    });
    
    async function loadQuestions() {
      try {
        const response = await fetch('questionBank.json');
        allQuestions = await response.json();
        
        // Aggregate all keywords
        allQuestions.forEach(q => {
          q.keywords.forEach(k => allKeywords.add(k.toLowerCase()));
        });
        
        allKeywords = Array.from(allKeywords).sort();
      } catch (error) {
        console.error('Error loading questions:', error);
        alert('Error loading questions. Please refresh the page.');
      }
    }
    
    function showKeywordSuggestions(searchTerm) {
      const suggestions = allKeywords.filter(k => k.includes(searchTerm) && !selectedKeywords.has(k));
      const container = $('#keyword-suggestions');
      container.empty();
      
      if (suggestions.length === 0) {
        container.addClass('hidden');
        return;
      }
      
      suggestions.slice(0, 10).forEach(keyword => {
        const item = $(`<div class="p-3 hover:bg-gray-100 cursor-pointer" onclick="addKeyword('${keyword}')">${keyword}</div>`);
        container.append(item);
      });
      
      container.removeClass('hidden');
    }
    
    function addKeyword(keyword) {
      selectedKeywords.add(keyword);
      updateSelectedKeywords();
      $('#keyword-search').val('');
      $('#keyword-suggestions').addClass('hidden');
    }
    
    function removeKeyword(keyword) {
      selectedKeywords.delete(keyword);
      updateSelectedKeywords();
    }
    
    function updateSelectedKeywords() {
      const container = $('#selected-keywords');
      container.empty();
      
      selectedKeywords.forEach(keyword => {
        const tag = $(`
          <div class="keyword-tag">
            <span>${keyword}</span>
            <span class="remove" onclick="removeKeyword('${keyword}')">
              <i class="fas fa-times"></i>
            </span>
          </div>
        `);
        container.append(tag);
      });
    }
    
    // Initialize checkboxes on page load
    $(document).ready(function() {
      $('.unit-checkbox').each(function() {
        const checkbox = this;
        const customCheckbox = $(checkbox).closest('label').find('.custom-checkbox');
        if (checkbox.checked) {
          customCheckbox.addClass('checked');
        }
        
        $(checkbox).on('change', function() {
          customCheckbox.toggleClass('checked', this.checked);
        });
      });
    });
    
    function selectAllUnits() {
      $('.unit-checkbox').prop('checked', true).trigger('change');
      $('.custom-checkbox').addClass('checked');
    }
    
    function deselectAllUnits() {
      $('.unit-checkbox').prop('checked', false).trigger('change');
      $('.custom-checkbox').removeClass('checked');
    }
    
    function startQuiz() {
      // Get selected units
      const selectedUnits = [];
      $('.unit-checkbox:checked').each(function() {
        selectedUnits.push(parseInt($(this).val()));
      });
      
      if (selectedUnits.length === 0) {
        alert('Please select at least one unit.');
        return;
      }
      
      // Get quiz mode
      const questionCountVal = $('#question-count').val().trim();
      if (questionCountVal === '') {
        isFreeplay = true;
      } else {
        isFreeplay = false;
        targetQuestionCount = parseInt(questionCountVal);
        if (!targetQuestionCount || targetQuestionCount < 1) {
          alert('Please enter a valid number of questions.');
          return;
        }
      }
      
      // Filter questions
      filteredQuestions = allQuestions.filter(q => {
        // Check unit
        if (!selectedUnits.includes(q.unit)) return false;
        
        // Check keywords if provided
        if (selectedKeywords.size > 0) {
          const questionKeywords = q.keywords.map(k => k.toLowerCase());
          return Array.from(selectedKeywords).some(sk => 
            questionKeywords.some(qk => qk.includes(sk))
          );
        }
        
        return true;
      });
      
      if (filteredQuestions.length === 0) {
        alert('No questions match your filters. Please adjust your selection.');
        return;
      }
      
      // Shuffle questions
      filteredQuestions = shuffleArray([...filteredQuestions]);
      
      // Reset state
      currentQuestionIndex = 0;
      score = 0;
      totalAnswered = 0;
      correctCount = 0;
      incorrectCount = 0;
      currentStreak = 0;
      selectedAnswer = null;
      showingFeedback = false;
      
      // Show quiz screen
      $('#setup-screen').addClass('hidden');
      $('#quiz-screen').removeClass('hidden');
      $('#results-screen').addClass('hidden');
      $('#question-arrow').removeClass('visible');
      
      if (isFreeplay) {
        $('#progress-container').addClass('hidden');
        $('#freeplay-stats').removeClass('hidden');
      } else {
        $('#progress-container').removeClass('hidden');
        $('#freeplay-stats').addClass('hidden');
        $('#total-questions').text(targetQuestionCount);
      }
      
      displayQuestion();
    }
    
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }
    
    function hasQuestionImage(q) {
      if (q == null) return false;
      if (!('data' in q)) return false;
      const d = q.data;
      if (d === false) return false;
      if (typeof d === 'string' || d === true) return true;
      return false;
    }
    
    function questionImageSrc(id) {
      return 'images/' + id + '.png';
    }
    
    function questionImageAlt(id) {
      const readable = id.replace(/-/g, ' ');
      return '(' + readable + ' reference image)';
    }
    
    function getReferencePdfPath(questionId) {
      const match = questionId.match(/^(.+)-q\d+$/);
      const base = match ? match[1] : questionId;
      return 'references/' + base + '.pdf';
    }
    
    async function openReferenceModal() {
      if (!currentQuestion) return;
      const refPath = getReferencePdfPath(currentQuestion.id);
      const defaultPath = 'references/TMSCA.pdf';
      let src = refPath;
      try {
        const r = await fetch(refPath, { method: 'HEAD' });
        if (!r.ok) src = defaultPath;
      } catch (_) {
        src = defaultPath;
      }
      const iframe = document.getElementById('reference-iframe');
      iframe.src = src;
      $('#reference-modal').addClass('active').removeClass('hidden').addClass('flex');
    }
    
    function closeReferenceModal(event) {
      if (!event || $(event.target).attr('id') === 'reference-modal' || $(event.target).closest('button').length) {
        $('#reference-modal').removeClass('active').addClass('hidden').removeClass('flex');
        document.getElementById('reference-iframe').src = '';
      }
    }
    
    function openImageModal(src, alt) {
      $('#image-modal-img').attr('src', src).attr('alt', alt);
      $('#image-modal').addClass('active').removeClass('hidden').addClass('flex');
    }
    
    function closeImageModal(event) {
      if (!event || $(event.target).attr('id') === 'image-modal' || $(event.target).closest('button').length) {
        $('#image-modal').removeClass('active').addClass('hidden').removeClass('flex');
        $('#image-modal-img').attr('src', '');
      }
    }
    
    function displayQuestion() {
      // Check if we need to loop questions
      if (!isFreeplay && currentQuestionIndex >= targetQuestionCount) {
        showResults();
        return;
      }
      
      // Loop back if we've exhausted questions
      if (currentQuestionIndex >= filteredQuestions.length) {
        currentQuestionIndex = 0;
      }
      
      currentQuestion = filteredQuestions[currentQuestionIndex];
      selectedAnswer = null;
      showingFeedback = false;
      $('#question-arrow').removeClass('visible');
      
      // Update progress (only in fixed mode)
      if (!isFreeplay) {
        $('#current-question-num').text(currentQuestionIndex + 1);
        const progress = ((currentQuestionIndex) / targetQuestionCount) * 100;
        $('#progress-bar').css('width', progress + '%');
      }
      
      // Display question
      $('#question-unit').text(currentQuestion.unit);
      $('#question-id-display').text(currentQuestion.id);
      $('#question-text').text(currentQuestion.question);
      
      // Question image (if data is string or true)
      const imgContainer = $('#question-image-container');
      imgContainer.hide().empty();
      if (hasQuestionImage(currentQuestion)) {
        const src = questionImageSrc(currentQuestion.id);
        const alt = questionImageAlt(currentQuestion.id);
        const wrap = $('<div class="question-image-wrap my-4" role="button" tabindex="0" title="Click to enlarge"></div>');
        const img = $('<img src="' + src + '" alt="' + alt.replace(/"/g, '&quot;') + '">');
        img.on('error', function() {
          $(this).attr('alt', alt);
        });
        wrap.append(img);
        wrap.on('click', function() {
          openImageModal(src, alt);
        });
        wrap.on('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openImageModal(src, alt);
          }
        });
        imgContainer.append(wrap).show();
      }
      
      // Display options
      const optionsContainer = $('#options-container');
      optionsContainer.empty();
      
      currentQuestion.options.forEach((option, index) => {
        const optionBtn = $(`
          <button class="option-btn w-full text-left p-4 bg-gray-50 border-2 border-gray-200 rounded-lg font-medium" 
                  onclick="selectOption(${index})" 
                  data-index="${index}">
            ${String.fromCharCode(65 + index)}. ${option}
          </button>
        `);
        optionsContainer.append(optionBtn);
      });
      
      updateStats();
      MathJax.typesetPromise();
    }
    
    function selectOption(index) {
      if (showingFeedback) return;
      
      selectedAnswer = index;
      const question = currentQuestion;
      const isCorrect = index === question.answer;
      
      // Disable all buttons
      $('.option-btn').prop('disabled', true);
      
      // Mark correct answer
      $(`.option-btn[data-index="${question.answer}"]`).addClass('correct');
      
      // Mark selected answer if incorrect
      if (!isCorrect) {
        $(`.option-btn[data-index="${index}"]`).addClass('incorrect');
      }
      
      // Update stats
      totalAnswered++;
      if (isCorrect) {
        score++;
        correctCount++;
        currentStreak++;
      } else {
        incorrectCount++;
        currentStreak = 0;
      }
      
      showingFeedback = true;
      $('#question-arrow').addClass('visible');
      updateStats();
    }
    
    function updateStats() {
      if (isFreeplay) {
        const accuracy = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
        $('#stat-accuracy').text(accuracy + '%');
        $('#stat-correct').html('✅ ' + correctCount);
        $('#stat-incorrect').html('❌ ' + incorrectCount);
        $('#stat-streak').html('🔥 ' + currentStreak);
      }
    }
    
    function nextQuestion() {
      currentQuestionIndex++;
      displayQuestion();
    }
    
    function showResults() {
      $('#quiz-screen').addClass('hidden');
      $('#results-screen').removeClass('hidden');
      $('#final-score').text(score);
      $('#final-total').text(totalAnswered);
    }
    
    function restartQuiz() {
      $('#setup-screen').removeClass('hidden');
      $('#quiz-screen').addClass('hidden');
      $('#results-screen').addClass('hidden');
      $('#question-arrow').removeClass('visible');
    }
    
    function showQuestionModal() {
      if (!currentQuestion) return;
      
      $('#modal-question-id').text(currentQuestion.id);
      $('#modal-question-text').text(currentQuestion.question);
      
      const optionsList = $('#modal-options');
      optionsList.empty();
      currentQuestion.options.forEach((option, index) => {
        const isCorrect = index === currentQuestion.answer;
        const div = $(`<div class="${isCorrect ? 'text-green-600 font-semibold' : 'text-gray-700'}">${String.fromCharCode(65 + index)}. ${option}${isCorrect ? ' (Correct)' : ''}</div>`);
        optionsList.append(div);
      });
      
      const keywordsContainer = $('#modal-keywords');
      keywordsContainer.empty();
      currentQuestion.keywords.forEach(keyword => {
        const tag = $(`<div class="px-3 py-1 bg-gray-200 text-gray-800 rounded-lg text-sm">${keyword}</div>`);
        keywordsContainer.append(tag);
      });
      
      $('#question-modal').addClass('active');
      
      // Render MathJax after modal content is populated
      if (window.MathJax) {
        MathJax.typesetPromise([document.getElementById('modal-question-text'), document.getElementById('modal-options')]);
      }
    }
    
    function closeModal(event) {
      if (!event || $(event.target).hasClass('modal') || $(event.target).closest('button').length) {
        $('#question-modal').removeClass('active');
      }
    }
  </script>
</body>
</html>
