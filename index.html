<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know Ur Schist - UIL Science Preparation</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    html, body {
        overflow: scroll;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    
    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
        display: none;
    }
    
    .galaxy-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 25%, #16213e 50%, #0f3460 75%, #0a0a1a 100%);
      z-index: -2;
    }
    
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
    }
    
    .planet {
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.5s ease;
    }
    
    .planets-desktop.planet:hover {
      transform: scale(1.1);
    }
    
    .planet-2.planets-desktop.planet:hover {
      transform: translateX(-50%) scale(1.1);
    }
    
    .planets-desktop.planet {
      z-index: 20;
      cursor: pointer;
    }
    
    /* Planet label: white cursive text in center (desktop and mobile) */
    .planet-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Dancing Script', 'Brush Script MT', cursive;
      font-size: clamp(1.25rem, 2.2vw, 2rem);
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 20px rgba(0,0,0,0.3);
      pointer-events: none;
      z-index: 2;
    }
    
    /* Moons: 5 decorative moons, further out, desktop only; below planets in z-order */
    .moon {
      position: fixed;
      border-radius: 50%;
      z-index: 10;
      pointer-events: none;
    }
    
    .moon-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    
    .moon-1 {
      width: clamp(32px, 4.5vw, 56px);
      height: clamp(32px, 4.5vw, 56px);
      top: 2%;
      left: 12%;
    }
    .moon-1 .moon-inner {
      background: linear-gradient(145deg, #9ca3af 0%, #e5e7eb 50%, #f9fafb 100%);
      box-shadow: inset -5px -5px 0 rgba(0,0,0,0.18), inset 2px 2px 0 rgba(255,255,255,0.5);
    }
    
    .moon-2 {
      width: clamp(40px, 5.5vw, 68px);
      height: clamp(40px, 5.5vw, 68px);
      top: 18%;
      left: 46%;
    }
    .moon-2 .moon-inner {
      background: linear-gradient(145deg, #6b7280 0%, #9ca3af 45%, #d1d5db 100%);
      box-shadow: inset -6px -6px 0 rgba(0,0,0,0.22), inset 3px 3px 0 rgba(255,255,255,0.35);
    }
    
    .moon-3 {
      width: clamp(28px, 3.8vw, 48px);
      height: clamp(28px, 3.8vw, 48px);
      bottom: 28%;
      left: 18%;
    }
    .moon-3 .moon-inner {
      background: linear-gradient(145deg, #d1d5db 0%, #f3f4f6 60%, #ffffff 100%);
      box-shadow: inset -4px -4px 0 rgba(0,0,0,0.12), inset 2px 2px 0 rgba(255,255,255,0.6);
    }
    
    .moon-4 {
      width: clamp(36px, 5vw, 62px);
      height: clamp(36px, 5vw, 62px);
      bottom: 8%;
      right: 24%;
    }
    .moon-4 .moon-inner {
      background: linear-gradient(145deg, #4b5563 0%, #6b7280 40%, #9ca3af 100%);
      box-shadow: inset -5px -5px 0 rgba(0,0,0,0.28), inset 2px 2px 0 rgba(255,255,255,0.2);
    }
    
    .moon-5 {
      width: clamp(44px, 6vw, 72px);
      height: clamp(44px, 6vw, 72px);
      top: 12%;
      right: 10%;
    }
    .moon-5 .moon-inner {
      background: linear-gradient(145deg, #e5e7eb 0%, #f3f4f6 50%, #ffffff 100%);
      box-shadow: inset -5px -5px 0 rgba(0,0,0,0.15), inset 3px 3px 0 rgba(255,255,255,0.5);
    }
    
    @media (max-width: 1023px) {
      .moon { display: none !important; }
    }
    
    .planet-link {
      text-decoration: none;
      cursor: pointer;
      color: white;
    }
    
    .planet-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }
    
    
    /* Varied rock animations - different ranges, timing, easing */
    @keyframes planet-rock-1 {
      0%, 100% { transform: rotate(-13deg); }
      50% { transform: rotate(11deg); }
    }
    @keyframes planet-rock-2 {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(15deg); }
    }
    @keyframes planet-rock-3 {
      0%, 100% { transform: rotate(-16deg); }
      45% { transform: rotate(9deg); }
    }
    @keyframes planet-rock-m1 {
      0%, 100% { transform: rotate(-11deg); }
      50% { transform: rotate(12deg); }
    }
    @keyframes planet-rock-m2 {
      0%, 100% { transform: rotate(-14deg); }
      55% { transform: rotate(10deg); }
    }
    @keyframes planet-rock-m3 {
      0%, 100% { transform: rotate(-9deg); }
      50% { transform: rotate(14deg); }
    }
    
    /* Planet 1 - biology, spaced out */
    .planet-1 {
      width: clamp(235px, 23vw, 355px);
      height: clamp(235px, 23vw, 355px);
      top: 10%;
      left: 8%;
    }
    .planet-1 .planet-inner {
      background: linear-gradient(135deg, #166534 0%, #22c55e 50%, #4ade80 100%);
      box-shadow: inset -28px -28px 0 rgba(0,0,0,0.28), inset 14px 14px 0 rgba(255,255,255,0.1);
      animation: planet-rock-1 2.3s ease-in-out infinite;
    }
    
    /* Planet 2 - chemistry, middle, spaced out */
    .planet-2 {
      width: clamp(205px, 20vw, 310px);
      height: clamp(205px, 20vw, 310px);
      bottom: 14%;
      left: 50%;
      top: auto;
      right: auto;
      transform: translateX(-50%);
    }
    .planet-2 .planet-inner {
      background: linear-gradient(135deg, #6b21a8 0%, #9333ea 50%, #a855f7 100%);
      box-shadow: inset -28px -28px 0 rgba(0,0,0,0.28), inset 14px 14px 0 rgba(255,255,255,0.1);
      animation: planet-rock-2 3.7s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    
    /* Planet 3 - physics, spaced out */
    .planet-3 {
      width: clamp(245px, 24vw, 365px);
      height: clamp(245px, 24vw, 365px);
      top: 34%;
      right: 8%;
      bottom: auto;
      left: auto;
    }
    .planet-3 .planet-inner {
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
      box-shadow: inset -28px -28px 0 rgba(0,0,0,0.28), inset 14px 14px 0 rgba(255,255,255,0.1);
      animation: planet-rock-3 2.1s ease-in-out infinite;
    }
    
    .planets-mobile {
      display: none;
    }
    
    /* Craters: desktop - larger, asymmetrical */
    @media (min-width: 1024px) {
      .planet-1 .planet-inner::before {
        content: '';
        position: absolute;
        width: 52px;
        height: 52px;
        background: rgba(0,0,0,0.38);
        border-radius: 50%;
        top: 20%;
        left: 26%;
      }
      .planet-1 .planet-inner::after {
        content: '';
        position: absolute;
        width: 32px;
        height: 32px;
        background: rgba(0,0,0,0.32);
        border-radius: 50%;
        bottom: 26%;
        right: 24%;
      }
      .planet-2 .planet-inner::before {
        content: '';
        position: absolute;
        width: 48px;
        height: 48px;
        background: rgba(0,0,0,0.38);
        border-radius: 50%;
        top: 30%;
        right: 26%;
      }
      .planet-2 .planet-inner::after {
        content: '';
        position: absolute;
        width: 34px;
        height: 34px;
        background: rgba(0,0,0,0.3);
        border-radius: 50%;
        bottom: 24%;
        left: 32%;
      }
      .planet-3 .planet-inner::before {
        content: '';
        position: absolute;
        width: 44px;
        height: 44px;
        background: rgba(0,0,0,0.38);
        border-radius: 50%;
        top: 16%;
        left: 36%;
      }
      .planet-3 .planet-inner::after {
        content: '';
        position: absolute;
        width: 28px;
        height: 28px;
        background: rgba(0,0,0,0.32);
        border-radius: 50%;
        bottom: 32%;
        right: 26%;
      }
    }
    
    @media (max-width: 1023px) {
      .planets-desktop {
        display: none;
      }
      
      .planets-mobile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3.5rem;
        padding: 2rem 0;
      }
      
      .planets-mobile .planet {
        position: relative;
        z-index: 2;
      }
      
      .planets-mobile .planet-label {
        font-size: clamp(1.1rem, 5vw, 1.6rem);
      }
      
      .planets-mobile .planet-link {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        bottom: auto;
        transition: transform 0.5s ease;
      }
      
      .planets-mobile .planet-1 {
        width: clamp(188px, 52vw, 268px);
        height: clamp(188px, 52vw, 268px);
      }
      .planets-mobile .planet-2 {
        width: clamp(172px, 48vw, 248px);
        height: clamp(172px, 48vw, 248px);
      }
      .planets-mobile .planet-3 {
        width: clamp(195px, 54vw, 272px);
        height: clamp(195px, 54vw, 272px);
      }
      
      .planets-mobile .planet-link:hover {
        transform: scale(1.1);
      }
      
      /* Mobile: planets slightly off horizontal center */
      .planets-mobile .planet-1 { transform: translateX(-10%); }
      .planets-mobile .planet-1:hover { transform: translateX(-10%) scale(1.1); }
      .planets-mobile .planet-2 { transform: translateX(8%); }
      .planets-mobile .planet-2:hover { transform: translateX(8%) scale(1.1); }
      .planets-mobile .planet-3 { transform: translateX(-6%); }
      .planets-mobile .planet-3:hover { transform: translateX(-6%) scale(1.1); }
      
      .planets-mobile .planet-1 .planet-inner {
        animation: planet-rock-m1 2.6s ease-in-out infinite;
      }
      .planets-mobile .planet-2 .planet-inner {
        animation: planet-rock-m2 3.3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .planets-mobile .planet-3 .planet-inner {
        animation: planet-rock-m3 2.4s ease-in-out infinite;
      }
      
      /* Craters on mobile - slightly larger than before, asymmetrical */
      .planets-mobile .planet-1 .planet-inner::before {
        content: '';
        position: absolute;
        width: 36px;
        height: 36px;
        background: rgba(0,0,0,0.38);
        border-radius: 50%;
        top: 22%;
        left: 30%;
      }
      .planets-mobile .planet-1 .planet-inner::after {
        content: '';
        position: absolute;
        width: 22px;
        height: 22px;
        background: rgba(0,0,0,0.32);
        border-radius: 50%;
        bottom: 30%;
        right: 20%;
      }
      .planets-mobile .planet-2 .planet-inner::before {
        content: '';
        position: absolute;
        width: 32px;
        height: 32px;
        background: rgba(0,0,0,0.38);
        border-radius: 50%;
        top: 28%;
        right: 30%;
      }
      .planets-mobile .planet-2 .planet-inner::after {
        content: '';
        position: absolute;
        width: 24px;
        height: 24px;
        background: rgba(0,0,0,0.3);
        border-radius: 50%;
        bottom: 26%;
        left: 38%;
      }
      .planets-mobile .planet-3 .planet-inner::before {
        content: '';
        position: absolute;
        width: 28px;
        height: 28px;
        background: rgba(0,0,0,0.38);
        border-radius: 50%;
        top: 20%;
        left: 42%;
      }
      .planets-mobile .planet-3 .planet-inner::after {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        background: rgba(0,0,0,0.32);
        border-radius: 50%;
        bottom: 38%;
        right: 30%;
      }
    }
    
    @media (min-width: 1024px) {
      .planets-mobile {
        display: none;
      }
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="galaxy-bg"></div>
  <div class="stars" id="stars"></div>
  
  <!-- Moons (desktop only, 5 moons further out, varied size/color) -->
  <div class="moon moon-1 hidden lg:block" aria-hidden="true"><span class="moon-inner"></span></div>
  <div class="moon moon-2 hidden lg:block" aria-hidden="true"><span class="moon-inner"></span></div>
  <div class="moon moon-3 hidden lg:block" aria-hidden="true"><span class="moon-inner"></span></div>
  <div class="moon moon-4 hidden lg:block" aria-hidden="true"><span class="moon-inner"></span></div>
  <div class="moon moon-5 hidden lg:block" aria-hidden="true"><span class="moon-inner"></span></div>
  
  <!-- Planets (desktop) with labels -->
  <a href="biology/index.html" class="planet planet-link planet-1 planets-desktop hidden lg:flex" aria-label="Biology"><span class="planet-inner"></span><span class="planet-label -rotate-[20deg]">biology</span></a>
  <a href="chemistry/index.html" class="planet planet-link planet-2 planets-desktop hidden lg:flex" aria-label="Chemistry"><span class="planet-inner"></span><span class="planet-label rotate-[35deg]">chemistry</span></a>
  <a href="physics/index.html" class="planet planet-link planet-3 planets-desktop hidden lg:flex" aria-label="Physics"><span class="planet-inner"></span><span class="planet-label -rotate-[25deg]">physics</span></a>
  
  <!-- Main Landing Section -->
  <section class="relative min-h-screen flex flex-col items-center justify-center z-10">
    <!-- Planets (mobile): vertical stack, no moons -->
    <div class="planets-mobile">
      <a href="biology/index.html" class="planet planet-link planet-1" aria-label="Biology"><span class="planet-inner"></span><span class="planet-label -rotate-[20deg]">biology</span></a>
      <a href="chemistry/index.html" class="planet planet-link planet-2" aria-label="Chemistry"><span class="planet-inner"></span><span class="planet-label rotate-[25deg]">chemistry</span></a>
      <a href="physics/index.html" class="planet planet-link planet-3" aria-label="Physics"><span class="planet-inner"></span><span class="planet-label -rotate-[25deg]">physics</span></a>
    </div>
  </section>
  
  <script>
    // Create stars
    function createStars() {
      const starsContainer = document.getElementById('stars');
      const numStars = 200;
      
      for (let i = 0; i < numStars; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = (Math.random() * 2 + 2) + 's';
        starsContainer.appendChild(star);
      }
    }
    
    $(document).ready(function() {
      createStars();
    });
  </script>
</body>
